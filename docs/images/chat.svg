<svg xmlns="http://www.w3.org/2000/svg" width="420" height="820" viewBox="0 0 420 820" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <clipPath id="screen"><rect x="3" y="3" width="414" height="814" rx="40"/></clipPath>
    <linearGradient id="userg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00ff66"/>
      <stop offset="1" stop-color="#00b347"/>
    </linearGradient>
    <linearGradient id="sendg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9dffc4"/>
      <stop offset="1" stop-color="#00ff66"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" y="3" fill="#000000" opacity="0.20"/>
    </pattern>
  </defs>

  <!-- phone frame -->
  <rect x="3" y="3" width="414" height="814" rx="40" fill="#000600" stroke="#0f5a32" stroke-width="2"/>

  <g clip-path="url(#screen)">
    <!-- faint matrix rain -->
    <g fill="#00ff66" opacity="0.13" font-size="13">
      <text x="40"  y="120">1 0 1 1 0</text>
      <text x="40"  y="138" opacity="0.6">A 7 F 2 9</text>
      <text x="120" y="500">0 1 0 0 1</text>
      <text x="120" y="518" opacity="0.6">9 C 3 1 E</text>
      <text x="300" y="240">1 1 0 1 0</text>
      <text x="300" y="258" opacity="0.6">5 B 8 0 2</text>
      <text x="220" y="640">0 0 1 0 1</text>
      <text x="360" y="560">1 0 1 1 0</text>
    </g>

    <!-- top bar -->
    <g>
      <line x1="16" y1="64" x2="404" y2="64" stroke="#0f5a32" stroke-width="1.5"/>
      <!-- hamburger -->
      <g stroke="#4dff88" stroke-width="2" stroke-linecap="round">
        <line x1="22" y1="28" x2="40" y2="28"/>
        <line x1="22" y1="34" x2="40" y2="34"/>
        <line x1="22" y1="40" x2="40" y2="40"/>
      </g>
      <text x="210" y="39" text-anchor="middle" fill="#00ff66" font-size="17" font-weight="700" letter-spacing="1.5" filter="url(#glow)">tether</text>
      <!-- online status dot -->
      <circle cx="392" cy="34" r="5.5" fill="#00ff66" filter="url(#glow)"/>
    </g>

    <!-- TODAY divider -->
    <text x="210" y="92" text-anchor="middle" fill="#2f9e5f" font-size="11" letter-spacing="2">— TODAY —</text>

    <!-- user message 1 -->
    <rect x="120" y="108" width="284" height="38" rx="14" fill="url(#userg)"/>
    <text x="262" y="132" text-anchor="middle" fill="#00140a" font-size="12.5" font-weight="700">run the tests on the api project</text>
    <text x="402" y="162" text-anchor="end" fill="#86efac" font-size="10.5">delivered ✓✓</text>

    <!-- routine reply 1 -->
    <rect x="16" y="178" width="262" height="58" rx="14" fill="#04140c" stroke="#0f5a32" stroke-width="1.2"/>
    <text x="30" y="203" fill="#4dff88" font-size="12.5">128 passed · 0 failed · 12.4s</text>
    <text x="30" y="223" fill="#00ff66" font-size="12.5" font-weight="700">✓ all green.</text>

    <!-- user voice note -->
    <rect x="244" y="262" width="160" height="44" rx="14" fill="url(#userg)"/>
    <!-- mic glyph -->
    <g fill="#00140a">
      <rect x="260" y="276" width="9" height="15" rx="4.5"/>
      <path d="M256 287 a8.5 8.5 0 0 0 17 0" fill="none" stroke="#00140a" stroke-width="2"/>
      <line x1="264.5" y1="296" x2="264.5" y2="300" stroke="#00140a" stroke-width="2"/>
    </g>
    <!-- waveform -->
    <g fill="#00140a">
      <rect x="284" y="284" width="3" height="6"  rx="1.5"/>
      <rect x="290" y="280" width="3" height="14" rx="1.5"/>
      <rect x="296" y="276" width="3" height="22" rx="1.5"/>
      <rect x="302" y="281" width="3" height="12" rx="1.5"/>
      <rect x="308" y="278" width="3" height="18" rx="1.5"/>
      <rect x="314" y="283" width="3" height="8"  rx="1.5"/>
    </g>
    <text x="388" y="290" text-anchor="end" fill="#00140a" font-size="11.5" font-weight="700">0:04</text>

    <!-- routine reply 2 -->
    <rect x="16" y="330" width="290" height="62" rx="14" fill="#04140c" stroke="#0f5a32" stroke-width="1.2"/>
    <text x="30" y="355" fill="#4dff88" font-size="12.5">heard: "deploy staging"</text>
    <text x="30" y="377" fill="#4dff88" font-size="12.5">staging is live <tspan fill="#9dffc4">staging.local</tspan> <tspan fill="#00ff66" font-weight="700">✓</tspan></text>

    <!-- widgets row (the taps) -->
    <g font-size="12">
      <rect x="16"  y="676" width="126" height="30" rx="15" fill="#072c19" stroke="#00ff66" stroke-opacity="0.5"/>
      <text x="79"  y="696" text-anchor="middle" fill="#4dff88">Deploy staging</text>
      <rect x="150" y="676" width="92"  height="30" rx="15" fill="#072c19" stroke="#00ff66" stroke-opacity="0.5"/>
      <text x="196" y="696" text-anchor="middle" fill="#4dff88">Run tests</text>
      <rect x="250" y="676" width="120" height="30" rx="15" fill="#072c19" stroke="#00ff66" stroke-opacity="0.5"/>
      <text x="310" y="696" text-anchor="middle" fill="#4dff88">Morning brief</text>
      <rect x="378" y="676" width="34"  height="30" rx="15" fill="none" stroke="#0f5a32" stroke-dasharray="4 3"/>
      <text x="395" y="697" text-anchor="middle" fill="#2f9e5f" font-size="15">+</text>
    </g>

    <!-- composer -->
    <line x1="16" y1="724" x2="404" y2="724" stroke="#0f5a32" stroke-width="1.2"/>
    <!-- attach (paperclip) -->
    <path d="M30 768 l16 -16 a6 6 0 0 1 9 9 l-16 16 a3.5 3.5 0 0 1 -5 -5 l13 -13"
          fill="none" stroke="#4dff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- mic -->
    <g transform="translate(64,748)" fill="#4dff88">
      <rect x="6" y="0" width="9" height="15" rx="4.5"/>
      <path d="M2 11 a8.5 8.5 0 0 0 17 0" fill="none" stroke="#4dff88" stroke-width="2"/>
      <line x1="10.5" y1="20" x2="10.5" y2="24" stroke="#4dff88" stroke-width="2"/>
    </g>
    <!-- input -->
    <rect x="96" y="746" width="224" height="42" rx="10" fill="#021610" stroke="#0f5a32"/>
    <text x="110" y="772" fill="#2f9e5f" font-size="13">Type a message…</text>
    <!-- send -->
    <rect x="328" y="746" width="76" height="42" rx="10" fill="url(#sendg)"/>
    <text x="366" y="772" text-anchor="middle" fill="#00140a" font-size="13" font-weight="700">Send</text>

    <!-- scanlines over everything -->
    <rect x="3" y="3" width="414" height="814" fill="url(#scan)"/>
  </g>
</svg>
